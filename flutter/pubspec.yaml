name: fintrack
description: Aplikasi pencatatan keuangan pribadi — FinTrack
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Navigation
  go_router: ^13.0.1

  # HTTP
  dio: ^5.4.0
  pretty_dio_logger: ^1.3.1

  # Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2

  # UI
  fl_chart: ^0.66.2
  cached_network_image: ^3.3.1
  image_picker: ^1.0.7
  intl: ^0.19.0
  shimmer: ^3.0.0
  lottie: ^3.0.0

  # Utils
  equatable: ^2.0.5
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  dartz: ^0.10.1
  google_fonts: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  freezed: ^2.4.6
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.9
  mocktail: ^1.0.2

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/lottie/

